<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>محمل الفيديو العالمي</title>
    <script>
      // Fix for "Cannot set property fetch of #<Window> which has only a getter"
      // This ensures that if any library tries to overwrite fetch, it doesn't crash the app.
      (function() {
        const originalFetch = window.fetch;
        try {
          Object.defineProperty(window, 'fetch', {
            configurable: true,
            enumerable: true,
            get: () => originalFetch,
            set: (v) => { console.warn('Attempted to overwrite window.fetch ignored.'); }
          });
        } catch (e) {
          console.warn('Could not redefine window.fetch, but continuing...');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
